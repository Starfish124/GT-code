# ============================================================================
#  GT-Code configuration
# ----------------------------------------------------------------------------
#  Roles (brain, fast, tiny, reviewer, embed) map to local models. You rarely
#  need to edit this: the FIRST-LAUNCH WIZARD evaluates the machine's hardware
#  and picks the biggest tier that runs well (1.5B minimum, 14B maximum — 27B+
#  is deliberately unsupported: too slow for interactive coding). Its choice
#  is saved to data/setup.json and applied on every launch; re-evaluate with
#  /setup, inspect with /doctor, and check served ids with /models.
# ============================================================================

providers:
  # Ollama is the model server GT runs on — the only provider it needs.
  ollama:
    base_url: http://localhost:11434/v1

# Defaults for a mid-range machine; the wizard overrides these per machine.
models:
  # The heavy reasoning model — planning + hard coding. 14B max by design.
  brain:
    provider: ollama
    model: "qwen3:14b"

  # Escalation model for a substantial coding task (loaded only when needed).
  fast:
    provider: ollama
    model: "qwen3:8b"

  # The RESIDENT default: routing, chat, quick questions AND everyday coding
  # all run on this one small model so it stays hot and nothing reloads between
  # turns. GT only escalates to fast/brain for real builds. Small-model-first
  # = fast. qwen2.5:1.5b is Apache-2.0 (corporate-clean, no Meta licence).
  tiny:
    provider: ollama
    model: "qwen2.5:1.5b"

  # Reviews interactions and extracts reusable "lessons" (self-improving loop).
  # Kept on the SAME model as 'tiny' on purpose: a bigger reviewer running in the
  # background after each task would evict the resident model and force a reload
  # on the next turn — the exact churn small-model-first is designed to avoid.
  reviewer:
    provider: ollama
    model: "qwen2.5:1.5b"

  # Analyses your session (periodically, never per-turn) to learn your
  # preferences — see the `profile` section (OFF by default). Reuses the same
  # small Apache-2.0 model as 'tiny', so nothing extra to pull.
  analyst:
    provider: ollama
    model: "qwen2.5:1.5b"

  # Embeddings for RAG / long-term memory.
  embed:
    provider: ollama
    model: "nomic-embed-text"

router:
  enabled: true         # auto-pick a model per request; toggle at runtime with /route
  default: tiny         # small-model-first: the resident 1.5B answers everyday
                        # turns; GT escalates to fast (8B) / brain (14B) only for
                        # real builds. One hot model = no reloads between turns.
  escalate_len: 160     # only requests longer than this spend a classifier word
                        # deciding whether to escalate off the resident model; short turns
                        # answer straight on the resident model (instant).
  work_min_role: fast   # the smallest model allowed to RUN TOOLS. The 1.5B is a
                        # great router/chat model but drops tool calls as prose,
                        # so real work turns run on at least the 8B; questions
                        # and chat still answer on the always-hot tiny. Set to
                        # tiny to let the resident model attempt tool work.
  prefer_fast_on_slow: true  # on a CPU-only machine (no GPU) a 14B crawls at a
                             # couple tok/s, so route 'brain' work to the 8B
                             # instead. Auto-detected at startup. /model brain
                             # still forces the 14B; set false to always allow it.

agent:
  max_steps: 20         # max tool-use iterations before GT must give a final answer
  max_history_turns: 10 # keep only the last N exchanges in context. Bounds the
                        # prompt so prefill time stays flat over a long session
                        # instead of creeping up; older turns drop off (/reset
                        # clears). Raise for more memory, lower for more speed.
  auto_approve: false   # if false, GT asks before running commands / writing files
  command_timeout: 300  # default seconds before run_command kills a command; the
                        # model can raise it per call (installs/builds) up to 1800.
                        # Dev servers should use background:true, not a big timeout.
  tool_protocol: auto   # auto = NATIVE function calling on models that support it
                        # (asked of Ollama per model), prompt-JSON fallback on the
                        # rest. 'native' / 'prompt' force one side for debugging.

performance:
  thinking: false       # Qwen3 hidden reasoning mode. OFF = much faster responses;
                        # toggle per-session with /think when you want deep thought.
  keep_alive: 8h        # keep models hot in RAM. Long on purpose: the one-time
                        # cold load of the tiny model (~30s on a CPU box) is then paid
                        # ONCE per boot — every later `gt` launch that day finds
                        # it already resident and answers instantly.
  num_ctx: 8192         # context window; bigger = slower prompt processing
  llm_timeout: 1800     # seconds with NO bytes from Ollama before a turn is
                        # abandoned. High on purpose: CPU model-load + prefill
                        # can legitimately run 10+ minutes sending nothing
                        # (a live 790s prefill died at the old 600s). Bail out
                        # early with esc, not a network timeout.
  # Sampling temperature T reshapes the softmax over token logits:
  #   p_i = exp(z_i / T) / sum_j exp(z_j / T)
  # Low T = sharp/deterministic (good for code & tool-call JSON); high T =
  # flatter/more natural (good for conversation). GT picks per turn: code &
  # build requests use `temperature`, plain conversation uses `temperature_chat`.
  temperature: 0.3      # precision default — code, tools, edits, planning
  temperature_chat: 0.7 # talking: warmer so replies feel natural, not robotic
                        # see/set live with /temp

memory:
  auto_learn: false     # OFF by default (corporate/confidentiality): after a task
                        # the reviewer would distil a reusable "lesson" into the
                        # local memory.db, and a lesson drawn from a client task
                        # can bake client names/paths into permanent storage. Turn
                        # on only in a non-confidential context.
  recall_k: 5           # how many memories/lessons to pull into context per turn
  min_score: 0.28       # ignore memories below this similarity (0..1)

compaction:
  enabled: true         # when the conversation outgrows agent.max_history_turns,
                        # distill the OLDEST exchanges into a rolling session
                        # summary (on the resident model, after your answer)
                        # instead of silently dropping them — the goal and early
                        # decisions survive a long build. /compact runs it now
                        # and shows the summary; /reset clears it.
                        # false = old turns just fall off (previous behaviour).
  keep_turns: 5         # exchanges kept verbatim after a compaction; everything
                        # older lives on only in the summary.
  max_chars: 1500       # cap the rolling summary — it is prefilled every turn,
                        # so short beats complete.

project_memory:
  enabled: true         # load GT.md into every work turn — the project's own
                        # standing instructions (stack, run/test commands,
                        # conventions), like Claude Code's CLAUDE.md. Layers:
                        # ~/.gt/GT.md (you, everywhere) + the nearest GT.md /
                        # AGENTS.md / CLAUDE.md above the workspace + a
                        # GT.local.md for personal overrides. Write one with
                        # /init, jot notes with '# <note>', inspect with /memory.
  max_chars: 6000       # cap the merged block so a sprawling file can't blow
                        # the context window (it's prefilled every work turn —
                        # concise beats complete).

profile:
  enabled: false        # OFF by default. When on, an LLM builds a durable
                        # behavioural profile of YOU (favoured stack, tone,
                        # dislikes) — that is automated profiling of an
                        # identifiable person, so it is strictly opt-in and prints
                        # a one-time notice the first time you enable it. Glass-box:
                        # view/clear it any time with /profile. Uses the analyst
                        # model (qwen2.5:1.5b, same as tiny — already present).
  on_quit: true         # analyse the session when you exit (skippable with Ctrl-C).
                        # This loads the analyst model once — a few seconds on a
                        # GPU, ~30s on a CPU box — and does not run per turn.
  every_turns: 0        # >0 ALSO analyses every N turns mid-session. Costs a model
                        # load each time on a one-model box, so leave 0 (exit-only).
  min_turns: 4          # skip analysis for a session shorter than this
  max_observations: 8   # cap how many preferences the profile holds

intent_gate:
  enabled: true         # confidence-gated planning: before a NEW build starts,
                        # GT spends one small model call weighing the plausible
                        # READINGS of the request (what's specified vs left to
                        # defaults). The confidence routes deterministically:
                        # high = build immediately (bias-to-action unchanged),
                        # medium = present a plan and wait for your "go",
                        # low = ask ONE clarifying question, then build.
                        # Never fires on chat, quick tasks, mid-task turns, or
                        # forced /mode code|plan sessions. Fail-open: if the
                        # check can't run, GT just builds as before.
  min_confidence: 75    # at/above this -> build now
  ask_below: 45         # below this (and a good question exists) -> ask once;
                        # between the two -> plan first
  gate_len: 240         # non-build work requests at least this long are also
                        # gated (a long spec deserves a read-back)

hooks:
  enabled: false        # OFF by default. Hooks run YOUR shell commands at fixed
                        # points in the loop — powerful, but it means anyone who
                        # can edit this file (or a config shipped in a repo) gets
                        # code execution on your machine. Enable only with a config
                        # you control and trust. Inspect what's configured with /hooks.
  timeout: 30           # seconds per hook before it's killed (fail-open)
  # Each event takes a list of {match, command, timeout} entries. `match` is
  # a regex on the tool name (pre_tool/post_tool only; omitted = every tool).
  # Every hook gets a JSON payload on stdin plus GT_EVENT / GT_TOOL / GT_CWD
  # env vars. Exit 0 = fine; exit 2 from pre_tool BLOCKS the tool call and
  # the model is told why; any other failure is warned about and ignored.
  #
  # pre_tool:                   # BEFORE a tool call — can veto it
  #   - match: "write_file|edit_file"
  #     command: "python scripts/protect_env.py"   # exit 2 = block
  # post_tool:                  # AFTER — stdout is appended to the result
  #   - match: "write_file"
  #     command: "ruff check --quiet . || echo lint problems, fix them"
  # user_prompt:                # stdout becomes [context] on your message
  #   - command: "python scripts/inject_sprint_goals.py"
  # turn_end:                   # after each final answer (log, notify)
  #   - command: "python scripts/log_turn.py"
  # session_start:              # when GT launches
  # session_end:                # when you quit

subagents:
  enabled: true         # give GT a run_agent tool: a READ-ONLY research
                        # sub-agent (read/list/search/recall/web) that works in
                        # its own separate context — only its final report
                        # comes back, so a broad exploration (mapping a
                        # codebase, chasing usages, web research) never floods
                        # or permanently slows the main conversation. It runs
                        # on the same already-loaded model: isolation, not
                        # parallelism. It cannot write, run commands, nest, or
                        # ask questions.
  max_steps: 8          # tool calls a sub-agent may spend before it must
                        # write its report from what it has
  max_report_chars: 3000  # cap on the report returned to the main agent

skills:
  enabled: true         # inject expert playbooks (skills/*.md) matched to each
                        # request — how to write good code, Claude-style Excel/
                        # PowerPoint/frontend, debugging discipline, etc.
  max: 2                # at most N playbooks per request. Keep low: each one is
                        # more prompt to prefill, and on a CPU box that's real
                        # seconds per turn. Conversation gets only the light
                        # 'conversation' playbook (or none).
  select: auto          # auto = rank ALL skills by embedding similarity when the
                        # embed model is up, else fall back to keyword triggers.
                        # 'keyword' forces the offline matcher.
  inject_max_chars: 1500  # cap each injected playbook so a couple of long ones
                          # from an imported library can't blow the context.
  # GT ships ONLY the first-party core playbooks above — no third-party skill
  # content. If YOU want to bulk-load your own Agent-Skills library (a folder
  # of SKILL.md files, or a git URL you control/trust), import it from inside
  # GT:  /skills import <path-or-git-url>  — converted skills land in
  # ~/.gt/skills/library/ (your machine only) and are embedded + ranked
  # semantically per request. Nothing is fetched automatically.

web:
  enabled: false        # OFF by default so GT is genuinely local/air-gapped out
                        # of the box (the README promise). When on, web_search
                        # sends the model's query to DuckDuckGo and web_fetch can
                        # GET any URL the model picks — either can carry text
                        # derived from your files off the machine. Turn on only
                        # when you actually need internet access for a task.

security:
  confine_to_workspace: true  # keep file reads/writes and command execution
                              # inside the folder GT was launched in. A path that
                              # escapes the workspace (an absolute path or ../..)
                              # ALWAYS prompts and can never be silenced by a
                              # standing grant or auto-approve — so the agent (or
                              # an injected instruction) can't quietly touch
                              # ~/.ssh, another client's folder, etc. Set false to
                              # restore whole-disk access (not recommended).

# Where the vector DB + logs live (relative to the GT-code folder).
data_dir: data
