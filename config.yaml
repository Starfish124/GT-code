# ============================================================================
#  GT-Code configuration
# ----------------------------------------------------------------------------
#  Roles (brain, fast, tiny, reviewer, embed) map to local models. You rarely
#  need to edit this: the FIRST-LAUNCH WIZARD evaluates the machine's hardware
#  and picks the biggest tier that runs well (3B minimum, 14B maximum — 27B+
#  is deliberately unsupported: too slow for interactive coding). Its choice
#  is saved to data/setup.json and applied on every launch; re-evaluate with
#  /setup, inspect with /doctor, and check served ids with /models.
# ============================================================================

providers:
  # Ollama is the model server GT runs on — the only provider it needs.
  ollama:
    base_url: http://localhost:11434/v1

# Defaults for a mid-range machine; the wizard overrides these per machine.
models:
  # The heavy reasoning model — planning + hard coding. 14B max by design.
  brain:
    provider: ollama
    model: "qwen3:14b"

  # Escalation model for a substantial coding task (loaded only when needed).
  fast:
    provider: ollama
    model: "qwen3:8b"

  # The RESIDENT default: routing, chat, quick questions AND everyday coding
  # all run on this one small model so it stays hot and nothing reloads between
  # turns. GT only escalates to fast/brain for real builds. 3B-first = fast.
  tiny:
    provider: ollama
    model: "llama3.2:3b"

  # Reviews interactions and extracts reusable "lessons" (self-improving loop).
  # Kept on the SAME 3B as 'tiny' on purpose: a bigger reviewer running in the
  # background after each task would evict the resident model and force a reload
  # on the next turn — the exact churn 3B-first is designed to avoid.
  reviewer:
    provider: ollama
    model: "llama3.2:3b"

  # Analyses your session (periodically, never per-turn) to learn your
  # preferences — see the `profile` section. Pull it to enable:
  #   ollama pull hermes3:3b
  analyst:
    provider: ollama
    model: "hermes3:3b"

  # Embeddings for RAG / long-term memory.
  embed:
    provider: ollama
    model: "nomic-embed-text"

router:
  enabled: true         # auto-pick a model per request; toggle at runtime with /route
  default: tiny         # 3B-first: the resident 3B answers everyday turns; GT
                        # escalates to fast (8B) / brain (14B) only for real
                        # builds. One hot model = no reloads between turns.
  escalate_len: 160     # only requests longer than this spend a classifier word
                        # deciding whether to escalate off the 3B; short turns
                        # answer straight on the resident model (instant).
  prefer_fast_on_slow: true  # on a CPU-only machine (no GPU) a 14B crawls at a
                             # couple tok/s, so route 'brain' work to the 8B
                             # instead. Auto-detected at startup. /model brain
                             # still forces the 14B; set false to always allow it.

agent:
  max_steps: 20         # max tool-use iterations before GT must give a final answer
  max_history_turns: 10 # keep only the last N exchanges in context. Bounds the
                        # prompt so prefill time stays flat over a long session
                        # instead of creeping up; older turns drop off (/reset
                        # clears). Raise for more memory, lower for more speed.
  auto_approve: false   # if false, GT asks before running commands / writing files
  command_timeout: 300  # default seconds before run_command kills a command; the
                        # model can raise it per call (installs/builds) up to 1800.
                        # Dev servers should use background:true, not a big timeout.

performance:
  thinking: false       # Qwen3 hidden reasoning mode. OFF = much faster responses;
                        # toggle per-session with /think when you want deep thought.
  keep_alive: 8h        # keep models hot in RAM. Long on purpose: the one-time
                        # cold load of the 3B (~30s on a CPU box) is then paid
                        # ONCE per boot — every later `gt` launch that day finds
                        # it already resident and answers instantly.
  num_ctx: 8192         # context window; bigger = slower prompt processing
  # Sampling temperature T reshapes the softmax over token logits:
  #   p_i = exp(z_i / T) / sum_j exp(z_j / T)
  # Low T = sharp/deterministic (good for code & tool-call JSON); high T =
  # flatter/more natural (good for conversation). GT picks per turn: code &
  # build requests use `temperature`, plain conversation uses `temperature_chat`.
  temperature: 0.3      # precision default — code, tools, edits, planning
  temperature_chat: 0.7 # talking: warmer so replies feel natural, not robotic
                        # see/set live with /temp

memory:
  auto_learn: true      # after each task, the reviewer extracts a lesson into memory
  recall_k: 5           # how many memories/lessons to pull into context per turn
  min_score: 0.28       # ignore memories below this similarity (0..1)

profile:
  enabled: true         # learn YOUR preferences over time (favoured stack, tone,
                        # conventions…) and bias GT's defaults to match. Glass-box:
                        # view/clear it any time with /profile. Needs the analyst
                        # model pulled (ollama pull hermes3:3b); no-ops without it.
  on_quit: true         # analyse the session when you exit (skippable with Ctrl-C).
                        # This loads the analyst model once — a few seconds on a
                        # GPU, ~30s on a CPU box — and does not run per turn.
  every_turns: 0        # >0 ALSO analyses every N turns mid-session. Costs a model
                        # load each time on a one-model box, so leave 0 (exit-only).
  min_turns: 4          # skip analysis for a session shorter than this
  max_observations: 8   # cap how many preferences the profile holds

skills:
  enabled: true         # inject expert playbooks (skills/*.md) matched to each
                        # request — how to write good code, Claude-style Excel/
                        # PowerPoint/frontend, debugging discipline, etc.
  max: 2                # at most N playbooks per request. Keep low: each one is
                        # more prompt to prefill, and on a CPU box that's real
                        # seconds per turn. Conversation gets only the light
                        # 'conversation' playbook (or none).
  select: auto          # auto = rank ALL skills by embedding similarity when the
                        # embed model is up, else fall back to keyword triggers.
                        # 'keyword' forces the offline matcher.
  inject_max_chars: 1500  # cap each injected playbook so a couple of long ones
                          # from an imported library can't blow the context.
  # GT ships ONLY the first-party core playbooks above — no third-party skill
  # content. If YOU want to bulk-load your own Agent-Skills library (a folder
  # of SKILL.md files, or a git URL you control/trust), import it from inside
  # GT:  /skills import <path-or-git-url>  — converted skills land in
  # ~/.gt/skills/library/ (your machine only) and are embedded + ranked
  # semantically per request. Nothing is fetched automatically.

web:
  enabled: true         # allow the web_search / web_fetch tools (needs internet).
                        # set false to keep GT fully air-gapped/offline.

# Where the vector DB + logs live (relative to the GT-code folder).
data_dir: data
